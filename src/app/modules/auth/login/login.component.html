<div class="login-container">
  <form [formGroup]="form" (ngSubmit)="submit()">

    <div class="top-header">
      <span>Sign in to your dashboard</span>
    </div>

    <div class="form-body">
      <div class="field">
        <input type="text" formControlName="username" placeholder="Username" />
        <small *ngIf="showUsernameRequired">Username is required</small>
        <small *ngIf="showUsernameMinlength">Minimum 5 characters</small>
      </div>

      <div class="field">
        <input type="password" formControlName="password" placeholder="Password" />
        <small *ngIf="showPasswordRequired">Password is required</small>
        <small *ngIf="showPasswordMinlength">Minimum 5 characters</small>
      </div>

      <small class="error" *ngIf="errorMsg">{{ errorMsg }}</small>

      <button type="submit" [disabled]="loading">
        {{ loading ? 'Loading...' : 'SIGN IN' }}
      </button>
    </div>
  </form>
</div>
